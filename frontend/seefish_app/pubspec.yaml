name: seefish_app
description: SeeFish - 鱼类识别APP，拍照识别鱼种
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Camera & Image
  camera: ^0.10.5
  image_picker: ^1.0.7
  image: ^4.1.4

  # Network
  http: ^1.2.0
  dio: ^5.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  path_provider: ^2.1.2
  intl: ^0.19.0
  uuid: ^4.2.2
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
